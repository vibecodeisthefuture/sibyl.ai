# ─── Sibyl System Configuration ───
# Global settings shared across ALL agents.
# Loaded by sibyl/core/config.py → load_system_config()
#
# PHILOSOPHY: Poll as fast as both platforms allow at ZERO COST.
# Sibyl is relentless, agile, and persistent in chasing growth.
#
# HOW TO MODIFY:
#   - Edit this file and restart Sibyl.
#   - For Docker: mount override via docker-compose volume.
#   - Credentials go in .env, NOT here (see .env.example).

system:
  name: "sibyl"
  version: "0.2.0"
  mode: "paper"        # "paper" = simulated (no real trades), "live" = real money
  log_level: "INFO"    # DEBUG | INFO | WARNING | ERROR | CRITICAL
  log_format: "json"   # "json" for machine-parseable, "console" for dev

database:
  path: "data/sibyl.db"      # SQLite file path (relative to project root)
  wal_mode: true              # Enable WAL mode for concurrent reads (recommended)
  busy_timeout_ms: 5000       # Wait up to 5s for locks instead of erroring

# ─── Polling Intervals (AGGRESSIVE) ───
# Tuned to the MAXIMUM rate both platforms permit at zero cost.
#
# RATE LIMIT BUDGET:
#   Polymarket: 900 req/10s general (90/s), price/book endpoints 150/s
#               → We set rate limiter to 80 req/s (90% headroom)
#   Kalshi:     Basic tier ~10 req/s
#               → We set rate limiter to 8 req/s (80% headroom)
#
# FORMULA: interval = num_tracked_markets × calls_per_market / rate_limit
#   With 50 tracked markets and 3 calls/market (price, book, trades):
#     Polymarket: 50 × 3 / 80 = ~1.9s per full scan
#     Kalshi:     50 × 3 / 8  = ~18.8s per full scan
#
# We set the poll_interval to the SLOWER platform (Kalshi) to stay safe,
# but use burst-capable intervals on Polymarket-specific scans.
polling:
  market_list_interval_seconds: 120     # 2 min — discover new markets FAST
  price_snapshot_interval_seconds: 5    # 5s — near-real-time price tracking
  trade_feed_interval_seconds: 10       # 10s — catch whale trades quickly
  orderbook_interval_seconds: 5         # 5s — structural changes are time-sensitive
  position_sync_interval_seconds: 15    # 15s — keep position state fresh
  open_interest_interval_seconds: 60    # 1 min — open interest shifts
  sync_interval_seconds: 30             # 30s — cross-platform divergence detection

# ─── Platform API Configuration ───
# Rate limiters set to ~80-90% of the free-tier ceiling for safety.
platforms:
  polymarket:
    base_url: "https://clob.polymarket.com"   # CLOB API for pricing data
    gamma_url: "https://gamma-api.polymarket.com"  # Gamma API for market metadata
    chain_id: 137                              # Polygon mainnet (Polymarket's chain)
    rate_limit_per_second: 80                  # Free tier: 900/10s = 90/s → 80/s safe
  kalshi:
    base_url: "https://api.elections.kalshi.com/trade-api/v2"  # Kalshi v2 API
    rate_limit_per_second: 8                   # Basic tier: ~10/s → 8/s safe

# ─── Cross-Platform Sync ───
# Settings for the CrossPlatformSyncAgent that matches markets across platforms.
cross_platform:
  similarity_threshold: 0.55              # Min score to consider two markets a match
  price_divergence_alert_pct: 0.05        # 5% price spread triggers an alert

# ─── Notifications ───
# Alert delivery configuration.  Currently supports ntfy.sh (free push notifications).
notifications:
  enabled: true
  channel: "ntfy"                         # Notification provider
  ntfy_server: "https://ntfy.sh"          # ntfy.sh public server

# ─── Category Signal Pipelines (Sprint 15) ───
# Controls the PipelineAgent, which runs 8 data-driven category pipelines
# (Economics, Weather, Sports, Crypto, Culture, Science, Geopolitics, Financial).
# Each pipeline fetches external data and produces signals for the SignalRouter.
pipeline:
  enabled: true
  run_interval_seconds: 900       # 15 minutes — how often pipelines run
  categories: "all"               # "all" or comma-separated (e.g., "crypto,weather")
  correlation_engine: true        # Run cross-category correlation after pipelines
  max_signals_per_run: 100        # Safety cap to prevent signal floods

# ─── Blitz Partition (Sprint 15) ───
# Controls the BlitzScanner + BlitzExecutor, which trade markets closing in
# ≤90 seconds with >85% confidence. Operates on SGE_BLITZ sub-engine capital.
# Detailed Blitz config lives in sge_config.yaml → blitz section.
blitz:
  enabled: true                   # Master switch; false disables Blitz entirely

# Path to manually curated market watchlist
markets_watchlist_path: "config/markets_watchlist.yaml"
