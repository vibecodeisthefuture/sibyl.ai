# ── Data Freshness Rules (Section 15) ──────────────────────────────────
# Maximum staleness in SECONDS before a signal is invalidated.
data_freshness_max_staleness:
  weather_forecast: 5400           # 90 minutes
  sports_injury_report: 7200       # 2 hours pre-game
  live_game_state: 60              # 60 seconds
  in_game_circuit_breaker: 10      # per-event type (5s/review/10s)
  economic_release: 1800           # 30 minutes post-release
  x_sentiment_window: 300          # 5-minute rolling window
  earnings_consensus: 86400        # 24 hours
  earnings_call_transcript: 300    # 5 minutes post-call
  fda_approval_calendar: 172800    # 48 hours
  geopolitical_event: 3600         # 1 hour

# ── Universal Avoidance Rules (Section 13) ────────────────────────────
# Markets matching ANY of these conditions are rejected regardless of
# signal strength or category.
universal_avoidance:
  min_open_interest_usd: 1000.0    # $1,000 liquidity floor
  reject_subjective_resolution: true
  reject_authority_gated: true
  reject_duplicate_exposure: true  # Both engines on same market/direction
  reject_announcement_polls: true
  reject_sports_prop_crossover: true
  reject_no_signal_coverage: true

# Subjective resolution keywords — if any appear in resolution criteria,
# flag the market for review.
subjective_resolution_keywords:
  - "at the discretion of"
  - "as determined by"
  - "in the opinion of"
  - "at sole discretion"
  - "subjective judgment"

# ── Sports Pre-Game / In-Game Decoupling (Section 5) ─────────────────
sports:
  pregame:
    entry_window_hours_before: 168  # 7 days before game
    entry_window_hours_min: 1       # 1 hour before game
    kelly_fraction_override: null   # Use standard ACE kelly
    position_size_scale: 1.0
  ingame:
    kelly_shrinkage_factor: 0.50    # Applied on top of ACE's 0.35x Kelly
    max_wager_pct_of_book: 0.02     # 2% of top-of-book depth
    polymarket_limit_order_only: true

  # In-game circuit breakers (event-triggered, Section 5)
  ingame_circuit_breakers:
    material_event:
      description: "Goal, red card, ejection, major penalty"
      action: "suspend_new_entries"
      cooldown_seconds: 5
    official_review:
      description: "VAR / Official Review"
      action: "suspend_new_entries"
      cooldown_seconds: 0           # Until review concludes + 3 seconds
      post_review_buffer_seconds: 3
    suspicious_activity:
      description: "Integrity flag or suspicious activity alert"
      action: "halt"
      cooldown_seconds: -1          # -1 = manual review required
    rapid_odds_swing:
      description: ">25% price move in <60 seconds"
      action: "suspend_new_entries"
      cooldown_seconds: 10
      price_move_threshold_pct: 0.25
      time_window_seconds: 60

# ── Override Protocol (Section 17) ────────────────────────────────────
# The safety valve for Tier 3 and beyond-cap opportunities.
# Fully autonomous — no human approval gate.
override_protocol:
  min_confidence: 0.90
  min_ev: 0.20
  min_independent_sources: 3
  max_position_size_multiplier: 0.50  # 50% of normal ACE max
  log_reasoning_required: true
  track_performance_separately: true
  # Auto-calibration: if overrides underperform over 90 days,
  # raise confidence threshold by this amount
  calibration_period_days: 90
  confidence_raise_increment: 0.02

