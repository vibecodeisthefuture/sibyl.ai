# ═══════════════════════════════════════════════════════════════════════
# Sibyl Investment Policy Configuration
# ═══════════════════════════════════════════════════════════════════════
#
# Machine-readable encoding of the Kalshi Investment Policy document.
# This file is the authoritative runtime source for all policy rules.
# Changes here take effect on next Sibyl restart.
#
# SECTIONS COVERED:
#   - Tier classification (Section 2)
#   - Category-tier mapping (Section 3)
#   - Capital allocation caps per category/engine (Section 12)
#   - Signal quality floors per tier (Section 14)
#   - Data freshness max staleness (Section 15)
#   - Universal avoidance rules (Section 13)
#   - Override protocol parameters (Section 17)
#   - Sports pre-game/in-game decoupling (Section 5)
#   - In-game circuit breaker definitions (Section 5)
# ═══════════════════════════════════════════════════════════════════════

# ── Tier Definitions (Section 2 + Section 14) ──────────────────────────
# Each tier defines:
#   - engines: which engines can auto-trade in this tier
#   - min_confidence: minimum signal confidence for entry
#   - min_ev: minimum expected value for entry
#   - auto_entry: whether signals can auto-route (Tier 3 = false)
#   - min_signal_count / min_confirmations: additional quality gates
tiers:
  tier_1:
    name: "Steady"
    description: "Data-rich, scheduled, predictable base rates"
    engines: ["SGE"]
    default_stance: "auto_trade"
    min_confidence: 0.60
    min_ev: 0.03
    auto_entry: true
  tier_2:
    name: "Volatile"
    description: "Momentum-driven, sentiment-sensitive, live data required"
    engines: ["ACE"]
    default_stance: "auto_trade_with_quality_floor"
    min_confidence: 0.65
    min_ev: 0.06
    min_signal_count: 20
    auto_entry: true
  tier_2_ingame:
    name: "In-Game"
    description: "Live sports in-game markets — higher risk, higher speed"
    engines: ["ACE"]
    default_stance: "auto_trade_with_quality_floor"
    min_confidence: 0.70
    min_ev: 0.08
    min_confirmations: 2
    auto_entry: true
  tier_3:
    name: "Restricted"
    description: "High uncertainty, limited advance signal, black swan risk"
    engines: ["ACE"]
    default_stance: "override_only"
    min_confidence: 0.85
    min_ev: 0.15
    min_source_confirmations: 3
    auto_entry: false

# ── Category → Tier Mapping (Section 3) ────────────────────────────────
# Maps each Kalshi market category to its governing tier.
# Categories with hybrid tiers use the more conservative tier for routing
# and allow both engines per the policy.
category_tier_map:
  "Weather": "tier_1"
  "Sports": "tier_2"
  "Sports (Pre-Game)": "tier_2"
  "Sports (In-Game)": "tier_2_ingame"
  "Mentions": "tier_1"         # hybrid: SGE for scheduled, ACE for surprises
  "Culture & Entertainment": "tier_2"
  "Economics & Macro": "tier_1"
  "Crypto & Digital Assets": "tier_2"
  "Science & Technology": "tier_1"  # hybrid: SGE for PDUFA, ACE for announcements
  "Geopolitics & Legal": "tier_3"
  # Aliases for older category naming
  "Politics": "tier_1"        # maps to Mentions
  "Climate": "tier_1"         # maps to Weather
  "Companies": "tier_1"       # hybrid
  "Financials": "tier_1"      # hybrid
  "Tech & Science": "tier_1"  # alias for Science & Technology
  # Short DB category names (used by market_discovery.py classify_category)
  "crypto": "tier_2"
  "economics": "tier_1"
  "weather": "tier_1"
  "sports": "tier_2"
  "culture": "tier_2"
  "science": "tier_1"
  "geopolitics": "tier_3"
  "financial": "tier_1"
  "politics": "tier_1"
  "other": "tier_3"

# ── Category Engine Permissions ────────────────────────────────────────
# Which engines are allowed to trade each category.
# Hybrid categories allow both SGE and ACE under different conditions.
category_engine_permissions:
  "Weather":
    primary: "SGE"
    allowed: ["SGE"]
    ace_surprises_only: true
  "Sports":
    primary: "ACE"
    allowed: ["ACE"]
  "Mentions":
    primary: "SGE"
    allowed: ["SGE", "ACE"]
  "Culture & Entertainment":
    primary: "ACE"
    allowed: ["ACE"]
  "Economics & Macro":
    primary: "SGE"
    allowed: ["SGE"]
    ace_surprises_only: true
  "Crypto & Digital Assets":
    primary: "ACE"
    allowed: ["ACE", "SGE"]
  "Science & Technology":
    primary: "SGE"
    allowed: ["SGE", "ACE"]
  "Geopolitics & Legal":
    primary: "ACE"
    allowed: ["ACE"]
    override_only: true

# ── Capital Allocation Caps (Section 12) ───────────────────────────────
# Per-engine, per-category caps as a fraction of that engine's capital.
# 'combined' is the max total exposure across both engines for a category.
