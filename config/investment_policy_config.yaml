# ── Multi-Category Market Resolution (Section 16) ────────────────────
multi_category:
  # When a market spans multiple categories, assign it to the one with
  # the strongest data source coverage. If coverage is equal, assign to
  # the higher (more restrictive) tier.
  prefer_strongest_coverage: true
  prefer_higher_tier_on_tie: true

# ── Implementation Priority (Section 19) ──────────────────────────────
# Order in which category signal pipelines should be built.
implementation_priority:
  - "Weather"
  - "Economics & Macro"
  - "Mentions"
  - "Sports (Pre-Game)"
  - "Culture & Entertainment"
  - "Crypto & Digital Assets"
  - "Science & Technology"
  - "Sports (In-Game)"
  - "Geopolitics & Legal"

# ── Blitz Partition Exemption (Section 20, Sprint 14) ────────────────
# The SGE Blitz partition operates under its own risk framework for trades
# meeting ALL of the following criteria:
#   (a) Market closes within ≤90 seconds
#   (b) Signal confidence exceeds 85%
#   (c) Expected value exceeds 4%
#   (d) Price is within 5-30¢ of terminal value (0 or 1)
#
# EXEMPT FROM (when all criteria met):
#   - Engine category permissions (Section 3)
#   - Signal type whitelist (SGE config)
#   - Execution style requirements (limit vs market order)
#   - Per-category capital caps (Section 12) — uses own concentration limits
#   - Tier classification gates (Section 2) — uses own confidence floor
#
# STILL SUBJECT TO:
#   - Universal avoidance rules (Section 13): min liquidity, subjective resolution
#   - Blitz-specific circuit breaker (15% of Blitz pool drawdown)
#   - Blitz position sizing limits (8% of pool per trade, 5 concurrent max)
#   - Blitz category concentration limit (40% of pool per category)
#   - Performance tracking: separate P&L, auto-calibration per Section 17
#
# RATIONALE (stakeholder-approved):
#   - Blitz confidence floor (85%) exceeds all standard tier minimums
#   - Capital isolation (14% of total portfolio) limits worst-case loss
#   - Policy compliance would reduce Blitz utilization to ~5-10% (non-functional)
#   - Market orders are the only viable execution for ≤90-second windows
blitz_partition_exemption:
  enabled: true
  exempt_from:
    - "engine_category_permissions"
    - "signal_type_whitelist"
    - "execution_style"
    - "per_category_capital_caps"
    - "tier_classification_gates"
  still_enforced:
    - "universal_avoidance_rules"
    - "blitz_circuit_breaker"
    - "blitz_position_sizing"
    - "blitz_category_concentration"
    - "separate_performance_tracking"
  auto_calibration:
    enabled: true
    calibration_period_days: 90
    confidence_raise_increment: 0.02
    min_trades_for_calibration: 50
