# ─── Stable Growth Engine (SGE) Configuration ───
# SPRINT 20: Crypto-only pivot. SGE is now the SOLE engine with 95% of capital.
# Risk parameters tuned for crypto market characteristics:
#   - Higher Kelly (0.25) for aggressive crypto sizing
#   - Lower EV floor (0.02) to eliminate the dead zone
#   - Lower confidence floor (0.55) to capture more crypto signals
#   - Wider position limits (5%) since we're single-category
#   - Wider stop loss (25%) — crypto brackets are volatile

engine:
  name: "SGE"
  capital_allocation_pct: 0.95     # Sprint 20: sole engine, 95% of portfolio

risk_policy:
  active_policy: "CRYPTO_FOCUSED"  # Sprint 20: tuned for crypto-only trading
  kelly_fraction: 0.25             # Aggressive Kelly for crypto (was 0.15)
  min_ev_threshold: 0.02           # +2% floor — eliminates dead zone (was 0.03)
  min_confidence: 0.55             # Lower floor to capture more crypto signals (was 0.60)
  max_single_position_pct: 0.05   # 5% of engine capital per position (was 2%)
  max_platform_exposure_pct: 0.60  # 60% of engine capital on Kalshi (was 25%)
  max_total_exposure_pct: 0.70     # 70% of engine capital total (was 55%)
  circuit_breaker_drawdown_pct: 0.15   # -15% engine drawdown (was -10%)
  daily_loss_limit_pct: 0.08       # -8% of engine capital (was -4%)
  per_market_stop_loss_pct: 0.25   # exit at -25% of position value (was -35%)

# Sprint 20: Expanded whitelist to accept ALL pipeline signal types.
# The old whitelist (ARBITRAGE, MEAN_REVERSION, LIQUIDITY_VACUUM) blocked
# every pipeline-generated signal (DATA_FUNDAMENTAL, DATA_MOMENTUM, etc.)
signal_whitelist:
  - ARBITRAGE
  - MEAN_REVERSION
  - LIQUIDITY_VACUUM
  - DATA_FUNDAMENTAL
  - DATA_SENTIMENT
  - DATA_MOMENTUM
  - DATA_DIVERGENCE
  - DATA_CATALYST
  - COMPOSITE_HIGH_CONVICTION
  - MOMENTUM
  - VOLUME_SURGE
  - STALE_MARKET
  - HIGH_CONVICTION_ARB
  - BRACKET_MODEL              # Sprint 20.5: Always-On Bracket Trader signals

execution:
  style: "patient"                 # patient limit orders
  rebalance_trigger: "daily"
  order_type: "limit"
  limit_offset_bps: 50             # place limit 50bps inside spread

# Sprint 20: Crypto gets dominant allocation, all others locked to 0
category_caps:
  crypto: 0.60                     # 60% cap — crypto is the sole focus
  politics: 0.00                   # Disabled
  sports: 0.00                     # Disabled
  science_tech: 0.00               # Disabled
  economics: 0.00                  # Disabled
  weather: 0.00                    # Disabled
  culture: 0.00                    # Disabled
  financial: 0.00                  # Disabled
  geopolitics: 0.00                # Disabled
  other: 0.00                      # Disabled

# ─── Blitz Partition ───────────────────────────────────────────────────
# SPRINT 20: Disabled — all capital consolidated to main SGE pool.
blitz:
  enabled: false
  capital_pct_of_sge: 0.00
