# ─── Stable Growth Engine (SGE) Configuration ───
# SPRINT 22: Risk parameters eased for faster profit scaling.
# Stakeholder-approved: ≥60% confidence floor, aggressive sizing.
#   - Kelly (0.30) for aggressive scaling
#   - EV floor (0.015) — captures more bracket edges
#   - Confidence floor (0.60) — stakeholder's educated bet threshold
#   - Position limits (8%) for meaningful per-trade impact
#   - Wider stop loss (35%) — crypto brackets are volatile
#   - Wider circuit breakers (25% drawdown, 12% daily loss)

engine:
  name: "SGE"
  capital_allocation_pct: 0.95     # Sprint 20: sole engine, 95% of portfolio

risk_policy:
  active_policy: "CRYPTO_FOCUSED"  # Sprint 20: tuned for crypto-only trading
  kelly_fraction: 0.30             # Sprint 22: aggressive scaling (was 0.25)
  min_ev_threshold: 0.015          # Sprint 22: +1.5% floor for more signals (was 0.02)
  min_confidence: 0.60             # Sprint 22: stakeholder ≥60% floor (was 0.55)
  max_single_position_pct: 0.08   # Sprint 22: 8% per position for impact (was 5%)
  max_platform_exposure_pct: 0.70  # Sprint 22: 70% Kalshi exposure (was 60%)
  max_total_exposure_pct: 0.80     # Sprint 22: 80% total for aggressive scaling (was 70%)
  circuit_breaker_drawdown_pct: 0.25   # Sprint 22: -25% engine drawdown (was -15%)
  daily_loss_limit_pct: 0.12       # Sprint 22: -12% daily loss (was -8%)
  per_market_stop_loss_pct: 0.35   # Sprint 22: wider stop for volatile crypto (was -25%)

# Sprint 20: Expanded whitelist to accept ALL pipeline signal types.
# The old whitelist (ARBITRAGE, MEAN_REVERSION, LIQUIDITY_VACUUM) blocked
# every pipeline-generated signal (DATA_FUNDAMENTAL, DATA_MOMENTUM, etc.)
signal_whitelist:
  - ARBITRAGE
  - MEAN_REVERSION
  - LIQUIDITY_VACUUM
  - DATA_FUNDAMENTAL
  - DATA_SENTIMENT
  - DATA_MOMENTUM
  - DATA_DIVERGENCE
  - DATA_CATALYST
  - COMPOSITE_HIGH_CONVICTION
  - MOMENTUM
  - VOLUME_SURGE
  - STALE_MARKET
  - HIGH_CONVICTION_ARB
  - BRACKET_MODEL              # Sprint 20.5: Always-On Bracket Trader signals

execution:
  style: "patient"                 # patient limit orders
  rebalance_trigger: "daily"
  order_type: "limit"
  limit_offset_bps: 50             # place limit 50bps inside spread

# Sprint 20: Crypto gets dominant allocation, all others locked to 0
category_caps:
  crypto: 0.60                     # 60% cap — crypto is the sole focus
  politics: 0.00                   # Disabled
  sports: 0.00                     # Disabled
  science_tech: 0.00               # Disabled
  economics: 0.00                  # Disabled
  weather: 0.00                    # Disabled
  culture: 0.00                    # Disabled
  financial: 0.00                  # Disabled
  geopolitics: 0.00                # Disabled
  other: 0.00                      # Disabled

# ─── Blitz Partition ───────────────────────────────────────────────────
# SPRINT 20: Disabled — all capital consolidated to main SGE pool.
blitz:
  enabled: false
  capital_pct_of_sge: 0.00
